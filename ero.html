<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERO - DEVICE & ACC REPORT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --accent-red: #e11d48;
            --accent-orange: #f59e0b;
            --accent-blue: #0284c7;
            --accent-emerald: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            background: linear-gradient(-45deg, #f8fafc, #eff6ff, #fff1f2, #f0fdf4);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .data-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .data-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-red);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="animated-bg min-h-screen text-slate-800">

<header class="glass-panel shadow-sm sticky top-0 z-50 border-b border-slate-100">
    <div class="max-w-7xl mx-auto p-4 md:px-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                <i class="fa-solid fa-chart-pie"></i>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-tighter text-slate-900 uppercase italic leading-none">ERO <span class="text-rose-600">REPORT</span></h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Device & Accessories Analytics</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-100 text-emerald-600 text-[9px] font-black uppercase tracking-widest">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Data Live
            </div>
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 text-slate-400 hover:text-rose-600 transition-colors">
                <i class="fa-solid fa-rotate text-sm"></i>
            </button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto p-4 lg:p-8">

    <!-- Search Section -->
    <div class="relative max-w-2xl mx-auto mb-12">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
        <input id="search" type="text" placeholder="Cari nama ERO atau kategori..."
            class="bg-white w-full p-5 pl-14 rounded-3xl shadow-xl shadow-slate-200/50 focus:outline-none focus:ring-4 focus:ring-rose-500/10 transition-all border border-slate-100 text-base font-medium" />
    </div>

    <div id="loading-state" class="flex flex-col items-center justify-center py-20">
        <div class="loader mb-4"></div>
        <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em]">Mengambil Data Performa...</p>
    </div>

    <div id="content-area" class="space-y-16 pb-24"></div>

    <!-- Back Button Floating -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
        <button onclick="goBack()" class="group px-8 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl hover:bg-black hover:-translate-y-1 transition-all active:scale-95 flex items-center gap-3">
            <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Kembali ke Portal
        </button>
    </div>

</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1n3TNktABD8xQCW7upfPf9puo9dFPmaF3S7D15FY9yvU/export?format=tsv";

const sectionConfig = {
    DEVICE: { color: "bg-rose-600", border: "border-rose-500", icon: "fa-mobile-screen", bg: "bg-rose-50", text: "text-rose-600" },
    AKSESORIS: { color: "bg-amber-500", border: "border-amber-500", icon: "fa-plug", bg: "bg-amber-50", text: "text-amber-600" },
    TV: { color: "bg-sky-600", border: "border-sky-600", icon: "fa-tv", bg: "bg-sky-50", text: "text-sky-600" },
    LAPTOP: { color: "bg-indigo-600", border: "border-indigo-600", icon: "fa-laptop", bg: "bg-indigo-50", text: "text-indigo-600" }
};

const area = document.getElementById("content-area");
const loading = document.getElementById("loading-state");

fetch(CSV_URL)
.then(res => res.text())
.then(text => {
    loading.style.display = "none";
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    let mode = "";

    Object.keys(sectionConfig).forEach(key => {
        const cfg = sectionConfig[key];
        area.innerHTML += `
            <section id="sec-${key}" class="hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl ${cfg.bg} ${cfg.text} flex items-center justify-center text-xl shadow-sm">
                            <i class="fa-solid ${cfg.icon}"></i>
                        </div>
                        <div>
                            <h2 class="font-black text-2xl text-slate-800 uppercase italic tracking-tight">${key}</h2>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Performance Leaderboard</p>
                        </div>
                    </div>
                </div>

                <!-- Desktop Table -->
                <div class="hidden lg:block overflow-hidden rounded-[2rem] border border-slate-100 bg-white/50 backdrop-blur-md shadow-sm mb-6">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900 text-white text-[9px] uppercase tracking-[0.2em] font-black">
                                <th class="p-5 pl-8">Nama Performer</th>
                                <th class="p-5 text-right">Target (IDR)</th>
                                <th class="p-5 text-center">Qty</th>
                                <th class="p-5 text-right">Value (IDR)</th>
                                <th class="p-5 text-right">Target/Day</th>
                                <th class="p-5 text-center italic">% ACV</th>
                            </tr>
                        </thead>
                        <tbody id="table-${key}" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <!-- Mobile & Tablet Grid -->
                <div id="mobile-${key}" class="lg:hidden grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>`;
    });

    lines.forEach(line => {
        const cols = line.split("\t");
        if (!cols[0]) return;
        
        const possibleKey = cols[0].toUpperCase();

        if (sectionConfig[possibleKey]) { 
            mode = possibleKey; 
            document.getElementById(`sec-${mode}`).classList.remove("hidden");
            return; 
        }

        // Skip headers atau baris kosong
        const skipWords = ["TARGET", "NAMA", "TOTAL", "VALUE", "ACHIEVEMENT"];
        if (!mode || skipWords.some(w => cols[0].toUpperCase().includes(w)) || cols.length < 5) return;

        const table = document.getElementById(`table-${mode}`);
        const mobile = document.getElementById(`mobile-${mode}`);
        
        const pctValue = cols[5] || "0%";
        const cleanPct = parseFloat(pctValue.replace('%', '')) || 0;
        
        // Logic badge warna
        let badgeClass = "bg-slate-100 text-slate-600";
        if (cleanPct >= 100) badgeClass = "bg-emerald-100 text-emerald-700";
        else if (cleanPct >= 70) badgeClass = "bg-sky-100 text-sky-700";
        else if (cleanPct > 0) badgeClass = "bg-rose-100 text-rose-700";

        const cfg = sectionConfig[mode];

        if(table) {
            table.innerHTML += `
                <tr class="data-row hover:bg-white transition-colors group">
                    <td class="p-5 pl-8 font-extrabold text-slate-800 text-sm">
                        <div class="flex items-center gap-3">
                            <span class="w-1.5 h-6 rounded-full ${cfg.color} opacity-0 group-hover:opacity-100 transition-opacity"></span>
                            ${cols[0]}
                        </div>
                    </td>
                    <td class="p-5 text-right font-mono text-[11px] text-slate-400">${cols[1]}</td>
                    <td class="p-5 text-center font-black text-slate-700 text-base">${cols[2]}</td>
                    <td class="p-5 text-right font-bold text-slate-900">${cols[3]}</td>
                    <td class="p-5 text-right text-slate-400 italic text-[11px]">${cols[4]}</td>
                    <td class="p-5 text-center">
                        <span class="px-4 py-1.5 rounded-xl text-[10px] font-black ${badgeClass} inline-block min-w-[60px] shadow-sm">${pctValue}</span>
                    </td>
                </tr>`;
        }

        if(mobile) {
            mobile.innerHTML += `
                <div class="mobile-card data-card glass-panel rounded-[2rem] p-6 border-l-4 ${cfg.border}">
                    <div class="flex justify-between items-start mb-5">
                        <div class="font-black text-slate-900 leading-tight pr-4 uppercase text-sm">${cols[0]}</div>
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black ${badgeClass} shadow-sm">${pctValue}</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50/50 p-3 rounded-2xl">
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">Target</p>
                            <p class="font-bold text-slate-600 text-[11px]">${cols[1]}</p>
                        </div>
                        <div class="bg-slate-50/50 p-3 rounded-2xl text-center">
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">Qty Sold</p>
                            <p class="font-black text-xl ${cfg.text}">${cols[2]}</p>
                        </div>
                        <div class="col-span-2 bg-slate-900 p-4 rounded-2xl flex justify-between items-center shadow-lg shadow-slate-200">
                            <span class="text-white/50 text-[8px] font-black uppercase tracking-widest">Total Value</span>
                            <span class="font-black text-white text-sm">${cols[3]}</span>
                        </div>
                        <div class="col-span-2 text-center">
                            <p class="text-slate-300 italic text-[9px] font-medium">Daily Target: ${cols[4]}</p>
                        </div>
                    </div>
                </div>`;
        }
    });
})
.catch(err => {
    loading.innerHTML = `<p class="text-rose-500 font-bold">Gagal memuat database. Periksa koneksi internet.</p>`;
    console.error(err);
});

document.getElementById("search").addEventListener("input", function () {
    const keyword = this.value.toLowerCase();
    const rows = document.querySelectorAll(".data-row, .mobile-card");
    
    rows.forEach(el => {
        const text = el.innerText.toLowerCase();
        if (text.includes(keyword)) {
            el.style.display = "";
            // Jika kartu mobile, pastikan container section-nya terlihat
            const section = el.closest('section');
            if(section) section.classList.remove('hidden');
        } else {
            el.style.display = "none";
        }
    });
});

function goBack() { 
    const btn = document.querySelector('button[onclick="goBack()"]');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Redirecting...';
    window.location.href = "index.html"; 
}
</script>

</body>
</html>
