<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M185 - ERO ACHIEVEMENT (LIGHT)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #f1f5f9;
            --card-white: rgba(255, 255, 255, 0.85);
            --accent-sky: #0284c7;
            --text-slate: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.1) 0, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.1) 0, transparent 40%);
            background-attachment: fixed;
            color: var(--text-slate);
        }

        .glass-card {
            background: var(--card-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: rgba(2, 132, 199, 0.3);
        }

        .text-gradient {
            background: linear-gradient(to right, #0f172a, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .loader {
            border: 3px solid rgba(2, 132, 199, 0.1);
            border-top: 3px solid #0284c7;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-6 glass-card p-6 rounded-[2rem]">
        <div class="flex items-center gap-5">
            <a href="index.html" class="group flex items-center justify-center w-12 h-12 rounded-2xl bg-white border border-slate-200 hover:bg-slate-50 transition-all shadow-sm">
                <i class="fa-solid fa-chevron-left text-slate-600 group-hover:-translate-x-1 transition-transform"></i>
            </a>
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-tight uppercase italic text-gradient">
                    ERO <span class="text-sky-600">ACHIEVEMENT</span>
                </h1>
                <p class="text-slate-400 text-[10px] uppercase tracking-[0.4em] font-bold mt-1">Light Edition Analytics</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div id="sync-status" class="hidden items-center gap-2 px-5 py-2.5 rounded-full bg-emerald-50 border border-emerald-100 text-emerald-600 text-[10px] font-bold uppercase tracking-widest">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Live Data Verified
            </div>
            <button onclick="location.reload()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-200 hover:border-sky-400/50 transition-all shadow-sm">
                <i class="fa-solid fa-rotate text-sky-600 text-sm"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-10 pb-24">
        <div id="loading-overlay" class="py-20 text-center glass-card rounded-[2.5rem] max-w-xl mx-auto">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em]">Synchronizing Performance Metrics...</p>
        </div>

        <div id="main-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Dynamic Content -->
        </div>

        <div class="text-center pt-10">
            <p class="text-slate-400 text-[9px] uppercase tracking-[0.5em] font-bold mb-8">SECURE END-POINT CONNECTION — M185 v5.0</p>
            <a href="index.html" class="inline-flex items-center gap-3 px-12 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-black hover:scale-105 active:scale-95 transition-all shadow-xl shadow-slate-200">
                <i class="fa-solid fa-house"></i> Dashboard Home
            </a>
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1n3TNktABD8xQCW7upfPf9puo9dFPmaF3S7D15FY9yvU/export?format=tsv";

        const config = {
            DEVICE: { color: '#0ea5e9', icon: 'fa-mobile-screen-button', bg: '#f0f9ff' },
            AKSESORIS: { color: '#f59e0b', icon: 'fa-headphones', bg: '#fffbeb' },
            TV: { color: '#8b5cf6', icon: 'fa-tv', bg: '#f5f3ff' },
            LAPTOP: { color: '#10b981', icon: 'fa-laptop', bg: '#ecfdf5' }
        };

        function parseIDR(val) {
            if (!val) return null;
            const cleaned = val.toString().replace(/[^\d]/g, "");
            return parseInt(cleaned) || null;
        }

        async function init() {
            try {
                const res = await fetch(CSV_URL + "&t=" + new Date().getTime());
                const text = await res.text();
                const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
                
                const sectionsData = { DEVICE: [], AKSESORIS: [], TV: [], LAPTOP: [] };
                let mode = "";

                lines.forEach(line => {
                    const c = line.split("\t");
                    const key = c[0]?.toUpperCase();

                    if (sectionsData.hasOwnProperty(key)) {
                        mode = key;
                        return;
                    }
                    
                    if (!mode) return;

                    const name = c[0]?.trim();
                    const value = parseIDR(c[3]);

                    if (!name || value === null || value === 0) return;
                    
                    const ignore = ["total", "target", "value", "achievement", "nama", "qty", "acv"];
                    if (ignore.some(word => name.toLowerCase().includes(word))) return;

                    sectionsData[mode].push({ name, value });
                });

                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('sync-status').classList.remove('hidden');
                document.getElementById('sync-status').classList.add('flex');

                Object.keys(sectionsData).forEach(type => {
                    if (sectionsData[type].length > 0) {
                        renderSection(type, sectionsData[type]);
                    }
                });

            } catch (e) {
                console.error(e);
                document.getElementById('loading-overlay').innerHTML = `<p class="text-rose-500 font-bold">Failed to connect to data source.</p>`;
            }
        }

        function renderSection(type, rawData) {
            const data = [...rawData].sort((a, b) => b.value - a.value);
            const top = data[0];
            const low = data[data.length - 1];
            const meta = config[type] || config.DEVICE;

            const card = document.createElement('div');
            card.className = "glass-card p-6 md:p-8 rounded-[2.5rem] flex flex-col";
            
            card.innerHTML = `
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-white" style="background: ${meta.bg}; color: ${meta.color}">
                            <i class="fa-solid ${meta.icon}"></i>
                        </div>
                        <div>
                            <h2 class="font-black text-xl uppercase italic leading-none text-slate-800">${type}</h2>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1.5">Sector Leaderboard</p>
                        </div>
                    </div>
                    <div class="text-right hidden sm:block">
                        <span class="text-[9px] font-black text-slate-400 bg-slate-100 px-4 py-1.5 rounded-full uppercase tracking-widest italic border border-slate-200">System Live</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5 mb-10">
                    <div class="bg-slate-50 border border-slate-100 p-5 rounded-[1.5rem]">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest">Rank #1 Performer</p>
                        </div>
                        <p class="text-xs font-bold text-slate-600 truncate mb-1">${top.name}</p>
                        <p class="text-xl font-black text-slate-900">Rp ${top.value.toLocaleString("id-ID")}</p>
                    </div>
                    <div class="bg-slate-50/50 border border-slate-100 p-5 rounded-[1.5rem] opacity-70">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest">Lowest Entry</p>
                        </div>
                        <p class="text-xs font-bold text-slate-600 truncate mb-1">${low.name}</p>
                        <p class="text-xl font-black text-slate-400">Rp ${low.value.toLocaleString("id-ID")}</p>
                    </div>
                </div>

                <div class="relative h-[300px] w-full mt-auto">
                    <canvas id="chart-${type}"></canvas>
                </div>
            `;

            document.getElementById('main-grid').appendChild(card);

            new Chart(document.getElementById(`chart-${type}`), {
                type: 'bar',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        data: data.map(d => d.value),
                        backgroundColor: data.map((_, i) => i === 0 ? meta.color : '#e2e8f0'),
                        borderRadius: 10,
                        borderSkipped: false,
                        barThickness: 12
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#0f172a',
                            titleFont: { size: 10, family: 'Plus Jakarta Sans', weight: 'bold' },
                            bodyFont: { size: 12, family: 'Plus Jakarta Sans', weight: '800' },
                            padding: 15,
                            cornerRadius: 15,
                            displayColors: false,
                            callbacks: { label: (ctx) => "Rp " + ctx.raw.toLocaleString("id-ID") }
                        }
                    },
                    scales: {
                        x: { 
                            display: false,
                            grid: { display: false }
                        },
                        y: { 
                            grid: { display: false },
                            border: { display: false },
                            ticks: { 
                                color: "#64748b", 
                                font: { size: 9, weight: '700', family: 'Plus Jakarta Sans' },
                                padding: 12
                            } 
                        }
                    }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
