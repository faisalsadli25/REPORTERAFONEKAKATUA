<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M114 DATA REPORT - PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-main: #f8fafc;
            --accent-red: #e11d48;
            --text-slate: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(225, 29, 72, 0.03) 0, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(51, 65, 85, 0.03) 0, transparent 50%);
            color: var(--text-slate);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .data-card {
            background: white;
            border: 1px solid #f1f5f9;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .data-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: var(--accent-red);
        }

        .text-gradient {
            background: linear-gradient(to right, #0f172a, #e11d48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-red);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="min-h-screen">

<header class="glass-panel shadow-sm sticky top-0 z-50 border-b border-slate-100">
    <div class="max-w-7xl mx-auto flex items-center justify-between p-4 md:px-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                <i class="fa-solid fa-file-invoice-dollar text-lg"></i>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-tighter text-slate-900 uppercase italic leading-none text-gradient">M114 <span class="text-rose-600">REPORT</span></h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Detailed Performance Data</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <span class="hidden sm:inline-block text-[9px] font-black text-rose-600 bg-rose-50 px-3 py-1 rounded-full border border-rose-100 uppercase tracking-widest">Enterprise Secured</span>
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 text-slate-400 hover:text-rose-600 transition-colors">
                <i class="fa-solid fa-rotate text-sm"></i>
            </button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto p-4 lg:p-8">

    <section class="text-center pt-8 pb-12">
        <div class="inline-block px-4 py-1.5 mb-6 rounded-full bg-slate-100 border border-slate-200 text-[9px] font-black uppercase tracking-[0.3em] text-slate-500">
            Analytics Module M114
        </div>
        <h2 class="text-3xl md:text-5xl font-black mb-8 text-slate-900 uppercase italic leading-tight">
            PERFORMANCE <br class="hidden md:block"> TRACKING CENTER
        </h2>
        
        <div class="relative max-w-2xl mx-auto">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input id="search" type="text" placeholder="Cari Toko, Promotor, atau Leasing..."
                class="bg-white w-full p-5 pl-14 rounded-3xl shadow-xl shadow-slate-200/50 focus:outline-none focus:ring-4 focus:ring-rose-500/10 transition-all border border-slate-100 text-base font-medium" />
        </div>
    </section>

    <div id="loading-state" class="flex flex-col items-center justify-center py-20">
        <div class="loader mb-4"></div>
        <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em]">Synchronizing Secure Data...</p>
    </div>

    <div id="content-area" class="space-y-20 pb-32"></div>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
        <button onclick="goBack()" class="group px-8 py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-2xl hover:bg-black hover:-translate-y-1 transition-all active:scale-95 flex items-center gap-3">
            <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Kembali ke Portal
        </button>
    </div>

</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1UMVGCANWjOQlwGFzi47POm7dVEtYOmAq4jz7O2rol5o/export?format=tsv";

const config = {
    STORE: { color: "bg-blue-600", border: "border-blue-500", icon: "fa-store", bg: "bg-blue-50", text: "text-blue-600" },
    ERO: { color: "bg-emerald-600", border: "border-emerald-500", icon: "fa-user-tie", bg: "bg-emerald-50", text: "text-emerald-600" },
    PROMOTOR: { color: "bg-amber-500", border: "border-amber-500", icon: "fa-tags", bg: "bg-amber-50", text: "text-amber-600" },
    FINANCING: { color: "bg-purple-600", border: "border-purple-600", icon: "fa-hand-holding-dollar", bg: "bg-purple-50", text: "text-purple-600" }
};

const area = document.getElementById("content-area");
const loading = document.getElementById("loading-state");

fetch(CSV_URL)
.then(res => res.text())
.then(text => {
    loading.style.display = "none";
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    let mode = "";

    // Build Sections
    Object.keys(config).forEach(key => {
        const cfg = config[key];
        area.innerHTML += `
            <section id="sec-${key}" class="hidden">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-14 h-14 rounded-2xl ${cfg.bg} ${cfg.text} flex items-center justify-center text-2xl shadow-sm border border-white">
                        <i class="fa-solid ${cfg.icon}"></i>
                    </div>
                    <div>
                        <h2 class="font-black text-2xl text-slate-800 uppercase italic tracking-tight">${key}</h2>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Real-time Performance Metrics</p>
                    </div>
                </div>

                <!-- Desktop Table View -->
                <div class="hidden lg:block overflow-hidden rounded-[2.5rem] border border-slate-100 bg-white shadow-sm mb-6">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900 text-white text-[9px] uppercase tracking-[0.2em] font-black">
                                <th class="p-5 pl-8">${key} NAME</th>
                                <th class="p-5 text-right">TARGET</th>
                                ${key !== 'FINANCING' ? '<th class="p-5 text-center">QTY</th>' : ''}
                                <th class="p-5 text-right">VALUE (IDR)</th>
                                <th class="p-5 text-right">TGT/DAY</th>
                                <th class="p-5 text-center italic">ACV/AV</th>
                            </tr>
                        </thead>
                        <tbody id="table-${key}" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>

                <!-- Mobile Card View -->
                <div id="mobile-${key}" class="lg:hidden grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
            </section>`;
    });

    lines.forEach(line => {
        const cols = line.split("\t");
        if (!cols[0]) return;
        
        const possibleKey = cols[0].toUpperCase();

        if (config[possibleKey]) { 
            mode = possibleKey; 
            document.getElementById(`sec-${mode}`).classList.remove("hidden");
            return; 
        }

        const skipWords = ["TARGET", "NAMA", "TOTAL", "VALUE", "ACHIEVEMENT", "QTY", "ACV"];
        if (!mode || skipWords.some(w => cols[0].toUpperCase().includes(w)) || cols.length < 3) return;

        const table = document.getElementById(`table-${mode}`);
        const mobile = document.getElementById(`mobile-${mode}`);
        const cfg = config[mode];

        // Mapping Logic:
        // Regular: [0]Nama, [1]Target, [2]Qty, [3]Value, [4]TgtDay, [5]ACV
        // Financing: [0]Nama, [1]Target, [2]Value, [3]TgtDay, [4]ACV
        
        const isFin = mode === 'FINANCING';
        const name = cols[0];
        const target = cols[1];
        const qty = isFin ? null : cols[2];
        const value = isFin ? cols[2] : cols[3];
        const tgtDay = isFin ? cols[3] : cols[4];
        const acv = isFin ? cols[4] : cols[5];

        const cleanAcv = parseFloat(acv?.replace('%', '')) || 0;
        let badgeClass = "bg-slate-100 text-slate-500";
        if (cleanAcv >= 100) badgeClass = "bg-emerald-100 text-emerald-700";
        else if (cleanAcv >= 50) badgeClass = "bg-rose-100 text-rose-700";

        if(table) {
            table.innerHTML += `
                <tr class="data-row hover:bg-slate-50 transition-colors group">
                    <td class="p-5 pl-8 font-extrabold text-slate-800 text-sm">
                        <div class="flex items-center gap-3">
                            <span class="w-1.5 h-6 rounded-full ${cfg.color} opacity-0 group-hover:opacity-100 transition-opacity"></span>
                            ${name}
                        </div>
                    </td>
                    <td class="p-5 text-right font-mono text-[11px] text-slate-400">${target}</td>
                    ${!isFin ? `<td class="p-5 text-center font-black text-slate-700 text-base">${qty}</td>` : ''}
                    <td class="p-5 text-right font-bold text-slate-900">${value}</td>
                    <td class="p-5 text-right text-slate-400 italic text-[11px]">${tgtDay}</td>
                    <td class="p-5 text-center">
                        <span class="px-4 py-1.5 rounded-xl text-[10px] font-black ${badgeClass} inline-block min-w-[60px] shadow-sm">${acv}</span>
                    </td>
                </tr>`;
        }

        if(mobile) {
            mobile.innerHTML += `
                <div class="mobile-card data-card rounded-[2.5rem] p-8 border-l-4 ${cfg.border}">
                    <div class="flex justify-between items-start mb-6">
                        <div class="font-black text-slate-900 leading-tight pr-4 uppercase text-sm">${name}</div>
                        <span class="px-3 py-1.5 rounded-xl text-[9px] font-black ${badgeClass} shadow-sm">${acv}</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl">
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">Target</p>
                            <p class="font-bold text-slate-600 text-[11px]">${target}</p>
                        </div>
                        ${!isFin ? `
                        <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl text-center">
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">Quantity</p>
                            <p class="font-black text-2xl ${cfg.text}">${qty}</p>
                        </div>` : `
                        <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl text-center">
                            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-1">target harian.</p>
                            <p class="font-bold text-slate-600 text-[11px]">${tgtDay}</p>
                        </div>
                        `}
                        <div class="col-span-2 bg-slate-900 p-5 rounded-2xl flex justify-between items-center shadow-lg shadow-slate-200">
                            <span class="text-white/50 text-[9px] font-black uppercase tracking-widest">Total Value</span>
                            <span class="font-black text-white text-base">${value}</span>
                        </div>
                        ${!isFin ? `
                        <div class="col-span-2 text-center pt-2">
                            <p class="text-slate-300 italic text-[9px] font-medium tracking-wide">target harian: ${tgtDay}</p>
                        </div>` : ''}
                    </div>
                </div>`;
        }
    });
})
.catch(err => {
    loading.innerHTML = `<p class="text-rose-500 font-bold">Failed to load system database.</p>`;
    console.error(err);
});

document.getElementById("search").addEventListener("input", function () {
    const keyword = this.value.toLowerCase();
    const items = document.querySelectorAll(".data-row, .mobile-card");
    
    items.forEach(el => {
        const text = el.innerText.toLowerCase();
        el.style.display = text.includes(keyword) ? "" : "none";
    });
});

function goBack() { 
    const btn = document.querySelector('button[onclick="goBack()"]');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Redirecting...';
    window.location.href = "index.html"; 
}
</script>

</body>
</html>
